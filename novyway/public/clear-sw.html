<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сброс кэша сайта</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1714;
        color: #eef7f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(233, 238, 235, 0.22);
        border-radius: 18px;
        background: rgba(19, 35, 30, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: rgba(238, 247, 240, 0.74);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Сбрасываю старую версию</h1>
      <p id="status">Отключаю service worker и очищаю локальный кэш...</p>
    </main>
    <script>
      async function clearSiteCache() {
        const status = document.getElementById('status')

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations()
          await Promise.all(registrations.map((registration) => registration.unregister()))
        }

        if ('caches' in window) {
          const keys = await caches.keys()
          await Promise.all(keys.map((key) => caches.delete(key)))
        }

        status.textContent = 'Готово. Возвращаю на свежую dev-версию...'
        window.setTimeout(() => {
          window.location.replace('./')
        }, 700)
      }

      clearSiteCache().catch((error) => {
        document.getElementById('status').textContent = `Не удалось очистить автоматически: ${error.message}`
      })
    </script>
  </body>
</html>
